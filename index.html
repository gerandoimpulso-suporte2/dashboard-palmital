<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Hotel Fazenda Palmital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#1a2f10,#2d4a1e,#0f2008);}
.card{background:#fff;border-radius:20px;padding:44px;width:420px;max-width:95vw;
  box-shadow:0 24px 64px rgba(0,0,0,0.3);}
.logos{display:flex;align-items:center;justify-content:center;gap:18px;
  margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid #ddd9ce;}
.logos img{height:68px;width:auto;}
.logos .sep{width:1px;height:36px;background:#ddd9ce;}
.gi{font-size:10px;font-weight:700;color:#2d4a1e;letter-spacing:.15em;
  text-transform:uppercase;text-align:center;line-height:1.6;}
.gi b{color:#c89a2a;display:block;font-size:13px;}
h1{font-family:'Playfair Display',serif;font-size:22px;color:#1a2f10;
  text-align:center;margin-bottom:4px;}
.sub{font-size:12px;color:#6b7280;text-align:center;margin-bottom:24px;}
label{display:block;font-size:11px;font-weight:600;color:#1a2f10;
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
input{width:100%;padding:12px 14px;border:1.5px solid #ddd9ce;border-radius:9px;
  font-family:'DM Sans',sans-serif;font-size:14px;background:#f5f3ee;
  outline:none;transition:.2s;margin-bottom:14px;}
input:focus{border-color:#2d4a1e;box-shadow:0 0 0 3px rgba(45,74,30,.1);background:#fff;}
button{width:100%;padding:13px;background:linear-gradient(135deg,#1a2f10,#2d4a1e);
  color:#fff;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.03em;
  transition:.15s;margin-top:4px;}
button:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,47,16,.3);}
.err{color:#c0392b;font-size:12px;text-align:center;margin-top:10px;
  background:#fdf0f0;border-radius:6px;padding:8px;display:none;}
.foot{text-align:center;margin-top:20px;font-size:11px;color:#9ca3af;}
</style>
