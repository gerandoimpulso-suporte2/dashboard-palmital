<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#1a2f10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Palmital ADS"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Palmital ADS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  font-family:'DM Sans',sans-serif;min-height:100vh;
  min-height:-webkit-fill-available;
  display:flex;align-items:center;justify-content:center;
  background:#1a2f10;
  padding:env(safe-area-inset-top,16px) 16px env(safe-area-inset-bottom,16px);
}
.orbs{position:fixed;inset:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;border:1px solid rgba(200,154,42,.1);}
.orb1{width:70vmax;height:70vmax;top:-25vmax;right:-25vmax;animation:spin 25s linear infinite;}
.orb2{width:50vmax;height:50vmax;bottom:-20vmax;left:-20vmax;animation:spin 35s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.card{
  background:#fff;border-radius:24px;
  padding:44px 36px 36px;width:min(400px,100%);
  position:relative;z-index:1;
  box-shadow:0 40px 80px rgba(0,0,0,.45);
  animation:rise .55s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:none;}}
.logos{display:flex;align-items:center;justify-content:center;gap:18px;
  margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid #ede9e0;}
.logos img{height:66px;width:auto;object-fit:contain;}
.logos .line{width:1px;height:36px;background:#ede9e0;}
.gi{text-align:center;}
.gi-by{font-size:9px;font-weight:700;color:#2d4a1e;letter-spacing:.2em;text-transform:uppercase;}
.gi-nm{font-size:13px;font-weight:700;color:#c89a2a;letter-spacing:.06em;text-transform:uppercase;}
h1{font-family:'Playfair Display',serif;font-size:22px;color:#1a2f10;text-align:center;margin-bottom:4px;}
.sub{font-size:12px;color:#6b7280;text-align:center;margin-bottom:28px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:10px;font-weight:700;color:#1a2f10;
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.fg input{
  width:100%;padding:14px 15px;border:1.5px solid #e2ddd5;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:15px;color:#1a1a1a;
  background:#faf9f6;-webkit-appearance:none;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.fg input:focus{border-color:#2d4a1e;box-shadow:0 0 0 3px rgba(45,74,30,.1);background:#fff;}
.btn{
  width:100%;padding:15px;margin-top:8px;
  background:linear-gradient(145deg,#1a2f10,#2d4a1e);
  color:#fff;border:none;border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;letter-spacing:.03em;-webkit-appearance:none;
  transition:opacity .15s,transform .15s;
}
.btn:active{opacity:.85;transform:scale(.98);}
.err{
  display:none;margin-top:12px;padding:10px 14px;
  background:#fff5f5;border:1px solid #fca5a5;border-radius:8px;
  color:#991b1b;font-size:12px;text-align:center;
}
.err.on{display:block;animation:shake .3s;}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.foot{text-align:center;margin-top:20px;font-size:11px;color:#a8a29e;}

/* Banner install PWA */
#ibar{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:#1a2f10;color:#fff;
  padding:16px 20px max(16px,env(safe-area-inset-bottom));
  flex-direction:column;gap:10px;
  box-shadow:0 -4px 24px rgba(0,0,0,.3);
}
#ibar.on{display:flex;}
#ibar p{font-size:13px;font-weight:600;}
#ibar span{font-size:11px;color:rgba(255,255,255,.6);}
.ibtns{display:flex;gap:8px;margin-top:2px;}
.ib{flex:1;padding:11px;border:none;border-radius:9px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.ib.y{background:#c89a2a;color:#1a2f10;}
.ib.n{background:rgba(255,255,255,.12);color:#fff;}
</style>
</head>

  <h1>Painel de Resultados</h1>
  <p class="sub">Dashboard de campanhas Meta ADS</p>
  <div class="fg"><label>Usuário</label>
    <input id="u" type="text" placeholder="seu usuário" autocomplete="username" inputmode="text"/></div>
  <div class="fg"><label>Senha</label>
    <input id="p" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
  <button class="btn" onclick="entrar()">Entrar no Painel</button>
  <div class="err" id="err">Usuário ou senha incorretos.</div>
  <p class="foot">Gerando Impulso × Hotel Fazenda Palmital</p>
</div>

<div id="ibar">
  <div><p>📱 Instalar como app</p><span>Acesso rápido na tela inicial do celular</span></div>
  <div class="ibtns">
    <button class="ib y" onclick="instalar()">Instalar agora</button>
    <button class="ib n" onclick="document.getElementById('ibar').classList.remove('on')">Depois</button>
  </div>
</div>

<script>
if('serviceWorker' in navigator)
  navigator.serviceWorker.register('./sw.js').catch(()=>{});

var dPmt;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault(); dPmt=e;
  setTimeout(()=>document.getElementById('ibar').classList.add('on'),3000);
});
function instalar(){
  document.getElementById('ibar').classList.remove('on');
  if(dPmt){dPmt.prompt();dPmt=null;}
}

var U={'palmital':'palmital@2025','gerando':'impulso@2025','admin':'admin123'};
var UN={'palmital':'Palmital','gerando':'Gerando Impulso','admin':'Admin'};
var UA={'palmital':'P','gerando':'G','admin':'A'};

function entrar(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  if(U[u]&&U[u]===p){
    sessionStorage.setItem('pauth','1');
    sessionStorage.setItem('puser',UN[u]);
    sessionStorage.setItem('puav',UA[u]);
    window.location.href='dashboard.html';
  }else{
    var el=document.getElementById('err');
    el.classList.remove('on');
    void el.offsetWidth;
    el.classList.add('on');
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')entrar();});
if(sessionStorage.getItem('pauth')==='1') window.location.href='dashboard.html';
</script>
